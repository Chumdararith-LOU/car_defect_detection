experiment_name: "car_defect_yolo26_seg_v1"
model: "yolo26n-seg.pt"  # Nano scale for mobile/Jetson
data: "data/processed/yolo_seg/data.yaml"

# YOLO26 Specifics (from PDF)
imgsz: 640
epochs: 150
batch: 32
optimizer: "MuSGD"       # YOLO26's hybrid optimizer
loss_scaling: True       # Progressive Loss + STAL support

# Edge Deployment Targets
export_formats: ["onnx", "ncnn", "engine"]  # TensorRT = engine
int8_quantize: True      # Enable PTQ/QAT tracking