dataset:
  processed_dir: "data/processed/sod"
  imgsz: 640

logging:
  experiment_name: "Automated_Car_Defect_Stage1_SOD"
  run_name: "Run_SOD_Tiled_HighRes_v2"

# Neural Network Configurations
training:
  backbone: "yolo26m-sem.pt"
  epochs: 50
  batch_size: 32
  lr0: 0.001
  weight_decay: 0.0005

# Industrial Double-Threshold Gating Parameters
gating_thresholds:
  pixel_thresh: 0.70                     # Individual pixel activation binarization cut-off (tau_pixel)
  anomaly_thresh: 0.0005
  near_miss_margin: 0.20                 # Log frames within 20% of anomaly_thresh for manual review
