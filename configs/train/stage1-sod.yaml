dataset:
  processed_dir: "data/processed/sod_tiled"
  imgsz: 1024

logging:
  experiment_name: "Automated_Car_Defect_Stage1_SOD"
  run_name: "Stage1_SOD_FocalLoss_Full_nano_version"

# Neural Network Configurations
training:
  backbone: "yolo26n-sem.pt"
  epochs: 50
  batch_size: 16
  lr0: 0.001
  weight_decay: 0.0005
  loss_function: "FocalCrossEntropyLoss"
  fl_gamma: 2.0

# Industrial Double-Threshold Gating Parameters
gating_thresholds:
  pixel_thresh_high: 0.47
  pixel_thresh_low: 0.35
  min_cc_area: 20
  max_cc_area_reject: 5000
  anomaly_thresh: 0.0005
  near_miss_margin: 0.20
