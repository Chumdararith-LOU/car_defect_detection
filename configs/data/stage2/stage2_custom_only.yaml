output_processed_dir: data/processed/stage2_custom
coco_json_paths:
  train:
  - data/raw/Roboflow/Rust Detection.v1i.coco/train/_annotations.coco.json
  - data/raw/Roboflow/socarC.v1i.coco/train/_annotations.coco.json
  - data/raw/Roboflow/car defect.v1i.coco/train/_annotations.coco.json
  - data/raw/Roboflow/crack_v2.v1i.coco/train/_annotations.coco.json
  - data/raw/Roboflow/Car Defect Detection.coco-segmentation/train/_annotations.coco.json
  - data/raw/Roboflow/car-damage-detection.v1i.coco/train/_annotations.coco.json
  val:
  - data/raw/Roboflow/Rust Detection.v1i.coco/valid/_annotations.coco.json
  - data/raw/Roboflow/socarC.v1i.coco/valid/_annotations.coco.json
  - data/raw/Roboflow/car defect.v1i.coco/valid/_annotations.coco.json
  - data/raw/Roboflow/crack_v2.v1i.coco/valid/_annotations.coco.json
  - data/raw/Roboflow/Car Defect Detection.coco-segmentation/valid/_annotations.coco.json
  - data/raw/Roboflow/car-damage-detection.v1i.coco/valid/_annotations.coco.json
  test:
  - data/raw/Roboflow/Rust Detection.v1i.coco/test/_annotations.coco.json
  - data/raw/Roboflow/socarC.v1i.coco/test/_annotations.coco.json
  - data/raw/Roboflow/car defect.v1i.coco/test/_annotations.coco.json
  - data/raw/Roboflow/crack_v2.v1i.coco/test/_annotations.coco.json
  - data/raw/Roboflow/Car Defect Detection.coco-segmentation/test/_annotations.coco.json
  - data/raw/Roboflow/car-damage-detection.v1i.coco/test/_annotations.coco.json
target_classes:
- dent
- scratch
- crack
- glass_shatter
- broken_component
- missing_component
- corrosion
class_mapping:
  Rust Detection.v1i.coco:
    car: 6
  socarC.v1i.coco:
    Breakage: 4
    Crushed: 0
    Scratched: 1
    Separated: 5
  car defect.v1i.coco:
    '1': 0
    '2': 1
    '3': 2
  crack_v2.v1i.coco:
    '- crack_v1 - 2024-09-12 5-58am': 2
  Car Defect Detection.coco-segmentation:
    '1': 0
    '2': 3
    '3': 4
    '4': 1
  car-damage-detection.v1i.coco:
    crack: 2
    dent: 0
    glass shatter: 3
    lamp broken: 4
    scratch: 1
filter_config:
  Rust Detection.v1i.coco:
    __all__:
      min_area_ratio: 0.005
      max_area_ratio: 1.0
  socarC.v1i.coco:
    __all__:
      min_area_ratio: 0.01
    Scratched:
      max_instances_per_image: 30
      max_total_instances: 12000
    Separated:
      max_aspect_ratio: 10.0
  car defect.v1i.coco:
    __all__:
      min_area_ratio: 0.005
    '3':
      min_area_ratio: 0.005
  Car Defect Detection.coco-segmentation:
    __all__:
      min_area_ratio: 0.01
    '1':
      min_area_ratio: 0.01
      max_area_ratio: 0.3
    '2':
      min_area_ratio: 0.005
    '3':
      min_area_ratio: 0.01
    '4':
      min_area_ratio: 0.01
  car-damage-detection.v1i.coco:
    __all__:
      min_area_ratio: 0.01
    crack:
      min_area_ratio: 0.005
    dent:
      min_area_ratio: 0.01
      max_area_ratio: 0.3
    glass shatter:
      min_area_ratio: 0.005
    lamp broken:
      min_area_ratio: 0.01
    scratch:
      min_area_ratio: 0.01
min_polygon_points: 6
clip_coordinates: true
