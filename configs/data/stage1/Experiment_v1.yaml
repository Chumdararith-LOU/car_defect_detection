# 1. Pipeline Paths
raw_data_dir: "data/raw/Car defect detection.v2i.coco"
output_processed_dir: "data/processed/Experiment_v1"

# 2. Roboflow COCO Annotation Paths (To be processed in Step 2)
coco_json_paths:
  train: "data/raw/Car defect detection.v2i.coco/train/_annotations.coco.json"
  val: "data/raw/Car defect detection.v2i.coco/valid/_annotations.coco.json"
  test: "data/raw/Car defect detection.v2i.coco/test/_annotations.coco.json"

# 3. Class Taxonomy Harmonization
# Mapping Roboflow's raw string names to YOLO integer IDs
class_mapping:
  "Dent": 0
  "Scratch": 1
  "Glass-Break": 2
  "Accident": 3
  "car-defect": 4

# 4. YOLOv26 Metadata Descriptor (Will be auto-generated as data.yaml)
yolo_metadata:
  path: "../data/processed/Experiment_v1" # Relative to training execution environment
  train: "train/images"
  val: "val/images"
  test: "test/images"
  names:
    0: dent
    1: scratch
    2: glass_break
    3: accident
    4: general_defect

# 5. MLOps Processing Settings
seed: 42
remove_corrupted_images: True
min_polygon_points: 6
clip_coordinates: True
