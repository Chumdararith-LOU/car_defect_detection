version: '3.8'

services:
  mlflow_tracker:
    image: python:3.10-slim
    container_name: mlflow_lifecycle_server
    volumes:
      - ./:/app
    working_dir: /app
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=http://0.0.0.0:5000
    command: >
      bash -c "pip install mlflow pysqlite3 &&
               mlflow server
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root ./mlruns
               --host 0.0.0.0
               --port 5000"
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    container_name: production_minio_vault
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: secure_vault_password_2026
    volumes:
      - /home/lamacpp/secure_workspace/minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
