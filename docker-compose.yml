version: '3.8'

services:
  mlflow_tracker:
    image: python:3.10-slim
    container_name: mlflow_lifecycle_server
    volumes:
      - ./:/app
    working_dir: /app
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=http://0.0.0.0:5000
    command: >
      bash -c "pip install mlflow pysqlite3 &&
               mlflow server
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root ./mlruns
               --host 0.0.0.0
               --port 5000"
    restart: unless-stopped
