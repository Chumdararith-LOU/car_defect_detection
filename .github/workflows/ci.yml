name: MLOps Lite Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the text blueprints and tracking configurations
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup an isolated Python environment mirroring the virtual environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. Install core framework and testing dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    # 4. Enforce automated style checks before execution
    - name: Lint with Flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all style warnings as non-fatal
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

    # 5. Execute your dataset pipeline verification suite
    - name: Run Schema Validation Tests
      run: |
        pytest src/tests/
